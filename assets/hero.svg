<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" role="img" aria-label="Pradeep Maddi — the control plane at the centre of a cloud platform topology">
  <defs>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#0a0e1a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0 L0 0 0 30" fill="none" stroke="#111a30" stroke-width="1"/>
    </pattern></defs>
  <rect width="900" height="430" rx="16" fill="#0a0e1a"/>
  <rect width="900" height="430" rx="16" fill="url(#grid)"/>
  <rect x="190" y="50" width="520" height="320" fill="url(#halo)"/>
  <rect x="0.5" y="0.5" width="899" height="429" rx="15.5" fill="none" stroke="#20304f"/>

  
  <path d="M450 210 L450 86" fill="none" stroke="#20304f" stroke-width="1.4"
        stroke-dasharray="3 7">
    <animate attributeName="stroke-dashoffset" from="0" to="-40" dur="1.6s" repeatCount="indefinite"/>
  </path>
  <circle r="3.2" fill="#7dd3fc" filter="url(#glow)">
    <animateMotion dur="2.4s" begin="0.0s" repeatCount="indefinite" path="M450 210 L450 86"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.4s" begin="0.0s" repeatCount="indefinite"/>
  </circle>
  <path d="M450 210 L273 142" fill="none" stroke="#20304f" stroke-width="1.4"
        stroke-dasharray="3 7">
    <animate attributeName="stroke-dashoffset" from="0" to="-40" dur="1.6s" repeatCount="indefinite"/>
  </path>
  <circle r="3.2" fill="#7dd3fc" filter="url(#glow)">
    <animateMotion dur="2.4s" begin="0.35s" repeatCount="indefinite" path="M450 210 L273 142"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.4s" begin="0.35s" repeatCount="indefinite"/>
  </circle>
  <path d="M450 210 L273 278" fill="none" stroke="#20304f" stroke-width="1.4"
        stroke-dasharray="3 7">
    <animate attributeName="stroke-dashoffset" from="0" to="-40" dur="1.6s" repeatCount="indefinite"/>
  </path>
  <circle r="3.2" fill="#7dd3fc" filter="url(#glow)">
    <animateMotion dur="2.4s" begin="0.7s" repeatCount="indefinite" path="M450 210 L273 278"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.4s" begin="0.7s" repeatCount="indefinite"/>
  </circle>
  <path d="M450 210 L627 278" fill="none" stroke="#20304f" stroke-width="1.4"
        stroke-dasharray="3 7">
    <animate attributeName="stroke-dashoffset" from="0" to="-40" dur="1.6s" repeatCount="indefinite"/>
  </path>
  <circle r="3.2" fill="#7dd3fc" filter="url(#glow)">
    <animateMotion dur="2.4s" begin="1.0499999999999998s" repeatCount="indefinite" path="M450 210 L627 278"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.4s" begin="1.0499999999999998s" repeatCount="indefinite"/>
  </circle>
  <path d="M450 210 L450 334" fill="none" stroke="#20304f" stroke-width="1.4"
        stroke-dasharray="3 7">
    <animate attributeName="stroke-dashoffset" from="0" to="-40" dur="1.6s" repeatCount="indefinite"/>
  </path>
  <circle r="3.2" fill="#7dd3fc" filter="url(#glow)">
    <animateMotion dur="2.4s" begin="1.4s" repeatCount="indefinite" path="M450 210 L450 334"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.4s" begin="1.4s" repeatCount="indefinite"/>
  </circle>
  <path d="M450 210 L627 142" fill="none" stroke="#20304f" stroke-width="1.4"
        stroke-dasharray="3 7">
    <animate attributeName="stroke-dashoffset" from="0" to="-40" dur="1.6s" repeatCount="indefinite"/>
  </path>
  <circle r="3.2" fill="#7dd3fc" filter="url(#glow)">
    <animateMotion dur="2.4s" begin="1.75s" repeatCount="indefinite" path="M450 210 L627 142"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.4s" begin="1.75s" repeatCount="indefinite"/>
  </circle>

  <!-- radar ping from the core -->
  <circle cx="450" cy="210" r="60" fill="none" stroke="#22d3ee" stroke-width="1.5">
    <animate attributeName="r" values="58;150" dur="3.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.55;0" dur="3.4s" repeatCount="indefinite"/>
  </circle>

  
  <g>
    <rect x="366" y="35" width="168" height="50" rx="10" fill="#101a30" stroke="#2b4a78"/>
    <circle cx="382" cy="60" r="4" fill="#22d3ee" filter="url(#glow)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" begin="0.0s" repeatCount="indefinite"/>
    </circle>
    <text x="396" y="57" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700" fill="#f2f6ff">PLATFORM @ SCALE</text>
    <text x="396" y="73" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="10.5" fill="#5f6f92">150+ AWS accounts</text>
  </g>
  <g>
    <rect x="106" y="110" width="168" height="50" rx="10" fill="#101a30" stroke="#2b4a78"/>
    <circle cx="122" cy="135" r="4" fill="#a78bfa" filter="url(#glow)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <text x="136" y="132" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700" fill="#f2f6ff">GOVERNANCE</text>
    <text x="136" y="148" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="10.5" fill="#5f6f92">Control Tower · AFT</text>
  </g>
  <g>
    <rect x="106" y="260" width="168" height="50" rx="10" fill="#101a30" stroke="#2b4a78"/>
    <circle cx="122" cy="285" r="4" fill="#2dd4bf" filter="url(#glow)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <text x="136" y="282" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700" fill="#f2f6ff">IaC / AUTOMATION</text>
    <text x="136" y="298" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="10.5" fill="#5f6f92">Terraform · Spacelift</text>
  </g>
  <g>
    <rect x="626" y="260" width="168" height="50" rx="10" fill="#101a30" stroke="#2b4a78"/>
    <circle cx="642" cy="285" r="4" fill="#22d3ee" filter="url(#glow)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" begin="1.2000000000000002s" repeatCount="indefinite"/>
    </circle>
    <text x="656" y="282" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700" fill="#f2f6ff">SECURITY POSTURE</text>
    <text x="656" y="298" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="10.5" fill="#5f6f92">detect · enforce · audit</text>
  </g>
  <g>
    <rect x="366" y="335" width="168" height="50" rx="10" fill="#101a30" stroke="#2b4a78"/>
    <circle cx="382" cy="360" r="4" fill="#a78bfa" filter="url(#glow)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="396" y="357" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700" fill="#f2f6ff">COST GOVERNANCE</text>
    <text x="396" y="373" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="10.5" fill="#5f6f92">FinOps · FOCUS 1.2</text>
  </g>
  <g>
    <rect x="626" y="110" width="168" height="50" rx="10" fill="#101a30" stroke="#2b4a78"/>
    <circle cx="642" cy="135" r="4" fill="#2dd4bf" filter="url(#glow)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" begin="2.0s" repeatCount="indefinite"/>
    </circle>
    <text x="656" y="132" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700" fill="#f2f6ff">K8s PLATFORM</text>
    <text x="656" y="148" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="10.5" fill="#5f6f92">multi-tenant EKS</text>
  </g>

  <!-- control-plane core -->
  <g>
    <rect x="334" y="168" width="232" height="84" rx="14" fill="#0e1426" stroke="url(#core)" stroke-width="2"/>
    <circle cx="358" cy="190" r="3.5" fill="#22d3ee"/>
    <text x="450" y="206" text-anchor="middle" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="26" font-weight="700" fill="#f2f6ff">PRADEEP MADDI</text>
    <text x="450" y="232" text-anchor="middle" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" letter-spacing="2" fill="url(#core)">CLOUD PLATFORM ENGINEER · FINOPS</text>
  </g>

  <text x="30" y="408" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#5f6f92">// control plane · 150+ account AWS Organization</text>
  <text x="870" y="408" text-anchor="end" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#5f6f92">fail-closed by design</text>
</svg>