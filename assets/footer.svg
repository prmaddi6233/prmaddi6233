<svg xmlns="http://www.w3.org/2000/svg" width="900" height="84" viewBox="0 0 900 84" role="img" aria-label="Open to Principal and Senior Cloud Platform Engineering roles">
  <defs>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#0a0e1a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0 L0 0 0 30" fill="none" stroke="#111a30" stroke-width="1"/>
    </pattern></defs>
  <rect width="900" height="84" rx="10" fill="#0a0e1a"/>
  <rect width="900" height="84" rx="10" fill="url(#grid)"/>
  <rect x="0.5" y="0.5" width="899" height="83" rx="9.5" fill="none" stroke="#20304f"/>
  <circle cx="450" cy="30" r="8" fill="none" stroke="#22d3ee" stroke-width="1.5">
    <animate attributeName="r" values="7;16" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="30" r="3" fill="url(#core)"/>
  <text x="450" y="66" text-anchor="middle" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="13" letter-spacing="1.5" fill="#5f6f92"><tspan fill="#22d3ee">// online · </tspan>OPEN TO PRINCIPAL / SENIOR CLOUD PLATFORM · AWS · FINOPS</text>
</svg>