<svg xmlns="http://www.w3.org/2000/svg" width="900" height="120" viewBox="0 0 900 120" role="img" aria-label="Scope: 150+ AWS accounts · $500K+/yr identified savings · 150 accounts guarded · 100% IaC-managed">
