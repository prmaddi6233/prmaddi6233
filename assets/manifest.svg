<svg xmlns="http://www.w3.org/2000/svg" width="900" height="292" viewBox="0 0 900 292" role="img" aria-label="Operator manifest — role: Cloud Platform Engineer and FinOps; org: 150+ account AWS Organization; building cloud-finops-agent">
  <defs>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#0a0e1a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0 L0 0 0 30" fill="none" stroke="#111a30" stroke-width="1"/>
    </pattern></defs>
  <rect width="900" height="292" rx="12" fill="#0e1426"/>
  <rect x="0.5" y="0.5" width="899" height="291" rx="11.5" fill="none" stroke="#20304f"/>
  <!-- title bar -->
  <circle cx="26" cy="26" r="4.5" fill="#22d3ee"/>
  <circle cx="42" cy="26" r="4.5" fill="#a78bfa"/>
  <circle cx="58" cy="26" r="4.5" fill="#2dd4bf"/>
  <text x="80" y="30" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" letter-spacing="1" fill="#5f6f92">operator.manifest &#183; control-plane spec</text>
  <line x1="0" y1="48" x2="900" y2="48" stroke="#20304f"/>

  <g font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
    <text x="34" y="90"  fill="#22d3ee" font-weight="700">role</text>
    <text x="150" y="90"  fill="#f2f6ff">Cloud Platform Engineer &#183; FinOps</text>

    <text x="34" y="120" fill="#22d3ee" font-weight="700">org</text>
    <text x="150" y="120" fill="#f2f6ff">150+ account AWS Organization</text>

    <text x="34" y="150" fill="#22d3ee" font-weight="700">domains</text>
    <text x="150" y="150" fill="#a78bfa">[ <tspan fill="#aeb9d4">platform engineering, FinOps, Kubernetes at scale, governance</tspan> ]</text>

    <text x="34" y="180" fill="#22d3ee" font-weight="700">building</text>
    <text x="150" y="180" fill="#2dd4bf">cloud-finops-agent</text>
    <text x="336" y="180" fill="#5f6f92"># tiered, fail-closed cost validation</text>

    <text x="34" y="216" fill="#22d3ee" font-weight="700">thesis</text>
    <text x="150" y="216" fill="#a78bfa">&#8250;</text>
    <text x="168" y="216" fill="#aeb9d4">Cost and security recommendations rot in backlogs because</text>
    <text x="168" y="242" fill="#aeb9d4">nobody proves they are safe to apply. I build the evidence</text>
    <text x="168" y="268" fill="#aeb9d4">layer that does.</text>
  </g>

  <circle r="2.6" fill="#7dd3fc" filter="url(#glow)">
    <animateMotion dur="3.2s" repeatCount="indefinite" path="M870 26 L30 26"/>
  </circle>
</svg>