<svg xmlns="http://www.w3.org/2000/svg" width="900" height="56" viewBox="0 0 900 56" role="img" aria-label="07 ESTABLISH LINK">
  <defs>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#0a0e1a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0 L0 0 0 30" fill="none" stroke="#111a30" stroke-width="1"/>
    </pattern></defs>
  <rect width="900" height="56" rx="10" fill="#0e1426"/>
  <rect x="0.5" y="0.5" width="899" height="55" rx="9.5" fill="none" stroke="#20304f"/>
  <circle cx="26" cy="28" r="5" fill="#22d3ee" filter="url(#glow)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <text x="46" y="34" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="18" font-weight="700" fill="url(#wire)">07</text>
  <text x="86" y="34" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="18" font-weight="700" letter-spacing="1" fill="#f2f6ff">ESTABLISH LINK</text>
  <path d="M300 28 L750 28" stroke="#20304f" stroke-width="1.2" stroke-dasharray="3 7">
    <animate attributeName="stroke-dashoffset" from="0" to="-40" dur="1.6s" repeatCount="indefinite"/>
  </path>
  <circle r="2.6" fill="#7dd3fc" filter="url(#glow)">
    <animateMotion dur="2.6s" repeatCount="indefinite" path="M300 28 L750 28"/>
  </circle>
  <text x="874" y="33" text-anchor="end" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5" fill="#5f6f92">contact</text>
</svg>